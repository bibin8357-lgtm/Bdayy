<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waiting for the Big Day</title>
    <style>
        /* 1. RAINBOW ANIMATED BACKGROUND */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: linear-gradient(124deg, #ff2400, #e81d1d, #e8b71d, #e3e81d, #1de840, #1ddde8, #2b1de8, #dd00f3, #dd00f3);
            background-size: 1800% 1800%;
            animation: rainbow 18s ease infinite;
        }

        @keyframes rainbow {
            0%{background-position:0% 82%}
            50%{background-position:100% 19%}
            100%{background-position:0% 82%}
        }

        /* 2. MOVING LINE-SHAPES */
        .shape {
            position: absolute;
            border: 2px solid rgba(255, 255, 255, 0.5);
            animation: float 20s linear infinite;
            z-index: 0;
        }

        .circle { border-radius: 50%; width: 50px; height: 50px; }
        .square { width: 60px; height: 60px; }
        .rectangle { width: 80px; height: 40px; }
        .triangle {
            width: 0; height: 0;
            border-left: 30px solid transparent;
            border-right: 30px solid transparent;
            border-bottom: 50px solid rgba(255, 255, 255, 0.5);
            border-top: none;
            background: none;
        }

        @keyframes float {
            from { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            to { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* 3. COUNTDOWN UI */
        #content-wrapper {
            text-align: center;
            z-index: 10;
            background: rgba(255, 255, 255, 0.15);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        h1 { font-size: 2.5rem; margin-bottom: 20px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }

        #countdown {
            display: flex;
            gap: 20px;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .time-box {
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 10px;
            min-width: 80px;
        }

        .number { font-size: 3rem; }
        .label { font-size: 0.8rem; text-transform: uppercase; opacity: 0.8; }

        #unlock-btn {
            margin-top: 30px;
            padding: 15px 30px;
            font-size: 1.2rem;
            background: white;
            color: #ff2400;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            display: none; /* Hidden until bday */
            transition: transform 0.3s ease;
        }

        #unlock-btn:hover { transform: scale(1.1); }
    </style>
</head>
<body>

    <script>
        const colors = ['circle', 'square', 'rectangle', 'triangle'];
        for (let i = 0; i < 15; i++) {
            let shape = document.createElement('div');
            shape.classList.add('shape');
            shape.classList.add(colors[Math.floor(Math.random() * colors.length)]);
            shape.style.left = Math.random() * 100 + 'vw';
            shape.style.animationDuration = (Math.random() * 10 + 10) + 's';
            shape.style.animationDelay = Math.random() * 5 + 's';
            document.body.appendChild(shape);
        }
    </script>

    <div id="content-wrapper">
        <h1 id="title">Countdown to Your Birthday!</h1>
        <div id="countdown">
            <div class="time-box"><span class="number" id="days">00</span><span class="label">Days</span></div>
            <div class="time-box"><span class="number" id="hours">00</span><span class="label">Hours</span></div>
            <div class="time-box"><span class="number" id="minutes">00</span><span class="label">Mins</span></div>
            <div class="time-box"><span class="number" id="seconds">00</span><span class="label">Secs</span></div>
        </div>
        <button id="unlock-btn" onclick="nextPage()">Click to Open Your Surprise 🎁</button>
    </div>

    <script>
        // Set the birthday date (Year 2026, Month March (2), Day 29, Time 00:00:00)
        const birthdayDate = new Date("March 29, 2026 00:00:00").getTime();

        const timer = setInterval(function() {
            const now = new Date().getTime();
            const distance = birthdayDate - now;

            // Calculations for days, hours, minutes and seconds
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Output the results
            document.getElementById("days").innerHTML = days;
            document.getElementById("hours").innerHTML = hours;
            document.getElementById("minutes").innerHTML = minutes;
            document.getElementById("seconds").innerHTML = seconds;

            // If the countdown is finished
            if (distance < 0) {
                clearInterval(timer);
                document.getElementById("countdown").style.display = "none";
                document.getElementById("title").innerHTML = "HAPPY BIRTHDAY!";
                document.getElementById("unlock-btn").style.display = "inline-block";
            }
        }, 1000);

        function nextPage() {
            // Replace 'content.html' with the name of your second page
            window.location.href = "content.html";
        }
    </script>
</body>
</html>
