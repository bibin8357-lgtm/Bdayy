<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Puzzle for You</title>
    <style>
        :root {
            --bg-color: #fce4ec; /* Light Pink */
            --card-back: #d81b60; /* Deep Pink */
            --card-front: #ffffff;
            --accent: #880e4f;
            --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            font-family: var(--font-family);
            color: var(--accent);
            touch-action: manipulation;
        }

        /* --- Header & UI --- */
        header {
            margin: 20px 0;
            text-align: center;
        }

        h1 { margin: 10px 0; font-size: 1.8rem; text-shadow: 1px 1px white; }

        .game-info {
            display: flex;
            gap: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            background: white;
            padding: 10px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* --- Game Grid --- */
        .game-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 columns */
            grid-gap: 12px;
            width: 90%;
            max-width: 400px;
            perspective: 1000px; /* Essential for 3D flip */
            padding-bottom: 40px;
        }

        .card {
            background-color: transparent;
            height: 80px; /* Set a fixed height for mobile */
            cursor: pointer;
            border-radius: 12px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        /* The flipped state */
        .card.flip {
            transform: rotateY(180deg);
        }

        /* Front & Back Faces */
        .card-front, .card-back {
            width: 100%;
            height: 100%;
            position: absolute;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem; /* Emoji size */
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden; /* Safari */
        }

        /* Front Face (the emoji side) */
        .card-front {
            background-color: var(--card-front);
            color: #333;
            transform: rotateY(180deg);
        }

        /* Back Face (the hidden side) */
        .card-back {
            background-color: var(--card-back);
            color: rgba(255,255,255,0.8);
            font-size: 1.5rem;
        }

        /* Match animation */
        .card.match {
            animation: match-pulse 0.5s ease-in-out;
        }

        @keyframes match-pulse {
            0% { transform: rotateY(180deg) scale(1); }
            50% { transform: rotateY(180deg) scale(1.1); }
            100% { transform: rotateY(180deg) scale(1); }
        }

        /* --- Win Screen Overlay --- */
        #win-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            text-align: center;
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none; /* Ignore clicks until active */
        }

        #win-screen.active {
            display: flex;
            opacity: 1;
            pointer-events: auto;
        }

        #win-screen h2 { font-size: 2.5rem; color: #d81b60; margin-bottom: 10px; }
        #win-screen p { font-size: 1.2rem; color: #555; }
        
        .reset-btn {
            background-color: var(--card-back);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1rem;
            margin-top: 20px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(216, 27, 96, 0.3);
            transition: background 0.2s;
        }
        
        .reset-btn:hover { background-color: #ad1457; }

        /* --- Mobile Responsiveness --- */
        @media (max-width: 350px) {
            .game-container { grid-gap: 8px; }
            .card { height: 70px; }
            .card-front { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>A Little Game For You</h1>
        <p style="margin: 0; color: #d81b60;">Find all the matching hearts! ✨</p>
    </header>

    <div class="game-info">
        <div>Moves: <span id="moves">0</span></div>
        <div>Matches: <span id="matches">0</span> / 8</div>
    </div>

    <main class="game-container" id="game-board">
        </main>

    <div id="win-screen">
        <h2>You Did It! 🎉</h2>
        <p>You matched them all in <strong id="final-moves">0</strong> moves.</p>
        <p style="color: #d81b60;">You are the brightest star in my sky! ❤️</p>
        <button class="reset-btn" onclick="resetGame()">Play Again</button>
    </div>

    <audio id="sound-flip" src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YXwAAAAA/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+/v7+"></audio>

    <script>
        // --- 1. Game Setup ---
        const board = document.getElementById('game-board');
        const movesDisplay = document.getElementById('moves');
        const matchesDisplay = document.getElementById('matches');
        const winScreen = document.getElementById('win-screen');
        const finalMovesDisplay = document.getElementById('final-moves');

        // The cute emojis she needs to match
        const emojis = ['💖', '💖', '⭐', '⭐', '🌹', '🌹', '🦋', '🦋', '🦄', '🦄', '💍', '💍', '🎀', '🎀', '💌', '💌'];
        
        // Game State Variables
        let cards = [];
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let moves = 0;
        let matches = 0;

        // --- 2. Initialize Game ---
        function initGame() {
            // Shuffle the emojis
            const shuffled = shuffle([...emojis]);

            // Create HTML for each card
            board.innerHTML = ''; // Clear existing
            shuffled.forEach(emoji => {
                const cardDiv = document.createElement('div');
                cardDiv.classList.add('card');
                cardDiv.dataset.emoji = emoji;

                cardDiv.innerHTML = `
                    <div class="card-front">${emoji}</div>
                    <div class="card-back">♥</div>
                `;
                
                cardDiv.addEventListener('click', flipCard);
                board.appendChild(cardDiv);
            });
        }

        // --- 3. Card Interactivity ---
        function flipCard() {
            if (lockBoard) return; // Prevent clicking if animation playing
            if (this === firstCard) return; // Prevent clicking same card twice

            // Play flip sound (optional)
            // document.getElementById('sound-flip').play();

            this.classList.add('flip');

            if (!hasFlippedCard) {
                // First card clicked
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            // Second card clicked
            secondCard = this;
            moves++;
            movesDisplay.innerText = moves;
            checkForMatch();
        }

        function checkForMatch() {
            // Check if datasets (emojis) match
            let isMatch = firstCard.dataset.emoji === secondCard.dataset.emoji;

            isMatch ? disableCards() : unflipCards();
        }

        // Match found: Keep them flipped and add the visual 'pulse'
        function disableCards() {
            firstCard.classList.add('match');
            secondCard.classList.add('match');
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);

            matches++;
            matchesDisplay.innerText = matches;

            resetBoardState();

            // Check if game complete
            if (matches === 8) {
                setTimeout(showWinScreen, 800);
            }
        }

        // No match: Lock clicking and flip them back after a short delay
        function unflipCards() {
            lockBoard = true;

            setTimeout(() => {
                firstCard.classList.remove('flip');
                secondCard.classList.remove('flip');
                resetBoardState();
            }, 1000); // 1 second delay
        }

        // Clean up state for next turn
        function resetBoardState() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }

        // --- 4. Win & Reset ---
        function showWinScreen() {
            finalMovesDisplay.innerText = moves;
            winScreen.classList.add('active');
            // simple confetti effect
            confetti();
        }

        function resetGame() {
            winScreen.classList.remove('active');
            moves = 0;
            matches = 0;
            movesDisplay.innerText = moves;
            matchesDisplay.innerText = matches;
            initGame();
        }

        // --- Utility: Shuffling Algorithm ---
        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        // --- Utility: Confetti (Basic Emoji burst) ---
        function confetti() {
            for(let i=0; i<30; i++) {
                const confetto = document.createElement('div');
                confetto.innerHTML = i % 2 === 0 ? '💖' : '🎉';
                confetto.style.position = 'fixed';
                confetto.style.left = Math.random() * 100 + 'vw';
                confetto.style.top = '-10px';
                confetto.style.zIndex = '101';
                confetto.style.animation = `fall ${Math.random() * 2 + 1}s linear forwards`;
                document.body.appendChild(confetto);
                
                // remove from DOM after falling
                setTimeout(() => confetto.remove(), 3000);
            }
        }

        // Keyframe for confetti fall (injected via JS)
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes fall {
                to { transform: translateY(110vh) rotate(${Math.random() * 360}deg); opacity: 0; }
            }
        `;
        document.head.appendChild(style);

        // Start!
        initGame();

    </script>
</body>
</html>
